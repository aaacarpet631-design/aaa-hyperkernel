<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Your Work Agreement</title>
  <style>
    :root { --red: #DC2626; --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; color: var(--ink); font: 16px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #portal-root { max-width: 620px; margin: 0 auto; padding: 20px 16px 60px; }
    .brand { font-weight: 800; color: var(--red); letter-spacing: .02em; }
    h1 { font-size: 1.5rem; margin: .3rem 0 0; }
    h2 { font-size: 1rem; margin: 1.4rem 0 .4rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .muted { color: var(--muted); }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .row.total { border-bottom: none; border-top: 2px solid var(--ink); font-size: 1.1rem; margin-top: 4px; }
    .term { font-size: .9rem; color: var(--muted); margin: .3rem 0; }
    .signbox { margin-top: 1.5rem; padding: 16px; background: #fff; border: 1px solid var(--line); border-radius: 12px; }
    .input { width: 100%; padding: 12px; font-size: 1rem; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; }
    .pad { width: 100%; height: 170px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px; touch-action: none; }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    .btn { flex: 1; padding: 14px; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
    .btn.primary { background: var(--red); color: #fff; }
    .btn.ghost { background: #f1f5f9; color: var(--ink); }
    .signed { margin-top: 1.2rem; padding: 14px; background: #ecfdf5; color: #065f46; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <main id="portal-root"><p class="muted">Loading…</p></main>
  <script>
    // Set this to your deployed portalProxy URL (public function URL).
    // Until set, the portal shows a friendly "not configured" message.
    window.PORTAL_PROXY_URL = '__PORTAL_PROXY_URL__';
  </script>
  <script src="/js/portal/portal-app.js"></script>
</body>
</html>
